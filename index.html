<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Métodos Numéricos</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1c2437;
    --border: #2a3650;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #0d1117;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(0,212,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(124,58,237,0.06) 0%, transparent 50%);
  }

  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    background: rgba(17,24,39,0.8);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  header h1 {
    font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  header p { color: var(--muted); font-size: 0.78rem; margin-top: 0.2rem; font-family: 'JetBrains Mono', monospace; }

  .main { max-width: 960px; margin: 0 auto; padding: 2rem; }

  /* Tabs */
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }

  .tab {
    padding: 0.55rem 1.1rem; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 600;
    transition: all 0.2s; letter-spacing: 0.02em;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
  }

  .card-title {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .card-title::before {
    content: ''; display: block; width: 3px; height: 14px; border-radius: 2px;
  }
  .t-dif .card-title::before { background: var(--accent); }
  .t-trap .card-title::before { background: var(--accent3); }
  .t-simp13 .card-title::before { background: var(--accent2); }
  .t-simp38 .card-title::before { background: var(--warn); }

  /* Inputs */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

  label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 0.35rem; font-family: 'JetBrains Mono', monospace; }

  input, select {
    width: 100%; padding: 0.6rem 0.9rem;
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; transition: border-color 0.2s;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }

  .hint { font-size: 0.68rem; color: var(--muted); margin-top: 0.3rem; font-family: 'JetBrains Mono', monospace; }

  /* Buttons */
  .btn {
    padding: 0.65rem 1.6rem; border-radius: 8px; border: none;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
    display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #00b8d9; transform: translateY(-1px); }
  .btn-green { background: var(--accent3); color: #000; }
  .btn-green:hover { background: #059669; transform: translateY(-1px); }
  .btn-purple { background: var(--accent2); color: #fff; }
  .btn-purple:hover { background: #6d28d9; transform: translateY(-1px); }
  .btn-yellow { background: var(--warn); color: #000; }
  .btn-yellow:hover { background: #d97706; transform: translateY(-1px); }

  /* Steps output */
  .steps-container {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.2rem; margin-top: 1.2rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
    max-height: 520px; overflow-y: auto; line-height: 1.8;
  }

  .step-header {
    color: var(--accent); font-weight: 700; font-size: 0.75rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: 1px solid var(--border); padding-bottom: 0.4rem;
    margin-bottom: 0.8rem;
  }

  .step { margin-bottom: 0.5rem; }
  .step-num { color: var(--muted); margin-right: 0.5rem; }
  .step-label { color: var(--warn); }
  .step-formula { color: #a78bfa; }
  .step-calc { color: var(--text); }
  .step-result { color: var(--accent3); font-weight: 700; }

  .result-box {
    background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(124,58,237,0.08));
    border: 1px solid rgba(0,212,255,0.3); border-radius: 10px;
    padding: 1rem 1.2rem; margin-top: 1rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .result-label { font-size: 0.72rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .result-value { font-size: 1.5rem; font-weight: 800; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

  .table-vals {
    width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem; margin: 0.8rem 0;
  }
  .table-vals th {
    background: var(--surface2); color: var(--muted); padding: 0.4rem 0.7rem;
    text-align: left; font-weight: 600; font-size: 0.7rem; letter-spacing: 0.05em;
  }
  .table-vals td { padding: 0.35rem 0.7rem; border-bottom: 1px solid var(--border); }
  .table-vals tr:last-child td { border-bottom: none; }
  .table-vals .hi { color: var(--accent3); }
  .table-vals .lo { color: var(--accent); }
  .table-vals .mid { color: #f9a8d4; }

  .error-msg { color: #f87171; font-size: 0.8rem; padding: 0.7rem; }

  .formula-display {
    background: var(--surface2); border-left: 3px solid var(--accent2);
    padding: 0.7rem 1rem; border-radius: 0 8px 8px 0;
    font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
    color: #a78bfa; margin: 0.8rem 0;
  }

  .n-control { display: flex; align-items: center; gap: 1rem; }
  .n-control input { max-width: 120px; }
  .n-badge {
    font-size: 0.68rem; background: rgba(124,58,237,0.2); border: 1px solid var(--accent2);
    color: var(--accent2); padding: 0.25rem 0.6rem; border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--code-bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>⟨ Métodos Numéricos ⟩</h1>
  <p>// Diferenciación · Newton-Cotes · Trapecio — precisión 4 decimales</p>
</header>

<div class="main">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('dif')">∂ Diferenciación</button>
    <button class="tab" onclick="switchTab('trap')">∫ Trapecio</button>
    <button class="tab" onclick="switchTab('simp13')">∫ Simpson 1/3</button>
    <button class="tab" onclick="switchTab('simp38')">∫ Simpson 3/8</button>
  </div>

  <!-- ====== DIFERENCIACIÓN ====== -->
  <div id="panel-dif" class="panel active">
    <div class="card t-dif">
      <div class="card-title">Diferenciación Numérica</div>
      <div class="grid-2">
        <div>
          <label>Función f(x)</label>
          <input id="dif-fx" type="text" value="x^3 - 2*x + 1" placeholder="ej: x^3 + 2*x">
          <div class="hint">Usa: x^2, Math.sin(x), Math.exp(x), Math.log(x)</div>
        </div>
        <div>
          <label>Punto x₀</label>
          <input id="dif-x0" type="number" value="2" step="any">
        </div>
      </div>
      <div class="grid-2" style="margin-top:1rem">
        <div>
          <label>Paso h</label>
          <input id="dif-h" type="number" value="0.1" step="any">
        </div>
        <div>
          <label>Tipo de diferencia</label>
          <select id="dif-tipo">
            <option value="adelante">Hacia adelante</option>
            <option value="atras">Hacia atrás</option>
            <option value="central" selected>Centrada</option>
          </select>
        </div>
      </div>
      <div style="margin-top:1.2rem">
        <button class="btn btn-primary" onclick="calcDif()">▶ Calcular derivada</button>
      </div>
      <div id="dif-out"></div>
    </div>
  </div>

  <!-- ====== TRAPECIO ====== -->
  <div id="panel-trap" class="panel">
    <div class="card t-trap">
      <div class="card-title">Método del Trapecio</div>
      <div class="grid-3">
        <div>
          <label>Función f(x)</label>
          <input id="trap-fx" type="text" value="x^2 + 1" placeholder="ej: x^2 + 3*x">
        </div>
        <div>
          <label>Límite inferior a</label>
          <input id="trap-a" type="number" value="0" step="any">
        </div>
        <div>
          <label>Límite superior b</label>
          <input id="trap-b" type="number" value="4" step="any">
        </div>
      </div>
      <div style="margin-top:1rem">
        <label>Número de subintervalos n</label>
        <input id="trap-n" type="number" value="4" min="1" max="100" step="1" style="max-width:160px">
      </div>
      <div style="margin-top:1.2rem">
        <button class="btn btn-green" onclick="calcTrap()">▶ Calcular integral</button>
      </div>
      <div id="trap-out"></div>
    </div>
  </div>

  <!-- ====== SIMPSON 1/3 ====== -->
  <div id="panel-simp13" class="panel">
    <div class="card t-simp13">
      <div class="card-title">Simpson 1/3</div>
      <div class="grid-3">
        <div>
          <label>Función f(x)</label>
          <input id="s13-fx" type="text" value="x^3 - x" placeholder="ej: x^3 - x">
        </div>
        <div>
          <label>Límite inferior a</label>
          <input id="s13-a" type="number" value="0" step="any">
        </div>
        <div>
          <label>Límite superior b</label>
          <input id="s13-b" type="number" value="2" step="any">
        </div>
      </div>
      <div style="margin-top:1rem">
        <label>Número de subintervalos n <span style="color:var(--muted)">(debe ser par)</span></label>
        <div class="n-control">
          <input id="s13-n" type="number" value="4" min="2" step="2" style="max-width:160px">
          <span class="n-badge">por defecto n=4</span>
        </div>
      </div>
      <div style="margin-top:1.2rem">
        <button class="btn btn-purple" onclick="calcSimp13()">▶ Calcular integral</button>
      </div>
      <div id="s13-out"></div>
    </div>
  </div>

  <!-- ====== SIMPSON 3/8 ====== -->
  <div id="panel-simp38" class="panel">
    <div class="card t-simp38">
      <div class="card-title">Simpson 3/8</div>
      <div class="grid-3">
        <div>
          <label>Función f(x)</label>
          <input id="s38-fx" type="text" value="x^4 - 2*x" placeholder="ej: x^4 - 2*x">
        </div>
        <div>
          <label>Límite inferior a</label>
          <input id="s38-a" type="number" value="0" step="any">
        </div>
        <div>
          <label>Límite superior b</label>
          <input id="s38-b" type="number" value="3" step="any">
        </div>
      </div>
      <div style="margin-top:1rem">
        <label>Número de subintervalos n <span style="color:var(--muted)">(debe ser múltiplo de 3)</span></label>
        <div class="n-control">
          <input id="s38-n" type="number" value="3" min="3" step="3" style="max-width:160px">
          <span class="n-badge">por defecto n=3</span>
        </div>
      </div>
      <div style="margin-top:1.2rem">
        <button class="btn btn-yellow" onclick="calcSimp38()">▶ Calcular integral</button>
      </div>
      <div id="s38-out"></div>
    </div>
  </div>

</div>

<script>
// ─── Utilidades ───────────────────────────────────────────
function f4(v){ return isNaN(v) ? 'NaN' : v.toFixed(4); }

function parseFn(expr){
  const clean = expr
    .replace(/\^/g,'**')
    .replace(/sen/gi,'Math.sin')
    .replace(/cos/gi,'Math.cos')
    .replace(/tan/gi,'Math.tan')
    .replace(/exp/gi,'Math.exp')
    .replace(/ln/gi,'Math.log')
    .replace(/log/gi,'Math.log10')
    .replace(/sqrt/gi,'Math.sqrt')
    .replace(/pi/gi,'Math.PI')
    .replace(/e(?![a-z])/gi,'Math.E');
  return new Function('x', `return ${clean};`);
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function errOut(id, msg){
  document.getElementById(id).innerHTML = `<div class="steps-container"><span class="error-msg">⚠ ${msg}</span></div>`;
}

// ─── DIFERENCIACIÓN ───────────────────────────────────────
function calcDif(){
  const fxStr = document.getElementById('dif-fx').value.trim();
  const x0    = parseFloat(document.getElementById('dif-x0').value);
  const h     = parseFloat(document.getElementById('dif-h').value);
  const tipo  = document.getElementById('dif-tipo').value;

  if(!fxStr || isNaN(x0) || isNaN(h) || h<=0) return errOut('dif-out','Verifica los datos ingresados.');

  let fn, fx0, fx_h, fx_mh, derivada, formula, nombreTipo;
  try { fn = parseFn(fxStr); } catch(e){ return errOut('dif-out','Error en la función: '+e.message); }

  try {
    fx0  = fn(x0);
    fx_h = fn(x0+h);
    fx_mh= fn(x0-h);
  } catch(e){ return errOut('dif-out','Error evaluando f(x): '+e.message); }

  let steps = '';

  if(tipo === 'adelante'){
    derivada = (fx_h - fx0) / h;
    nombreTipo = 'Diferencia Hacia Adelante';
    formula = "f'(x₀) ≈ [f(x₀+h) − f(x₀)] / h";
    steps = `
<div class="step"><span class="step-num">1.</span><span class="step-label">Fórmula:</span></div>
<div class="formula-display">${formula}</div>
<div class="step"><span class="step-num">2.</span><span class="step-label">Datos:</span>
  <span class="step-calc">  x₀ = ${f4(x0)},  h = ${f4(h)}</span></div>
<div class="step"><span class="step-num">3.</span><span class="step-label">Evaluar:</span>
  <span class="step-calc">  f(x₀) = f(${f4(x0)}) = <b>${f4(fx0)}</b></span></div>
<div class="step"><span class="step-calc">           f(x₀+h) = f(${f4(x0+h)}) = <b>${f4(fx_h)}</b></span></div>
<div class="step"><span class="step-num">4.</span><span class="step-label">Sustituir:</span>
  <span class="step-formula">  f'(${f4(x0)}) ≈ [${f4(fx_h)} − ${f4(fx0)}] / ${f4(h)}</span></div>
<div class="step"><span class="step-calc">             = ${f4(fx_h - fx0)} / ${f4(h)}</span></div>
<div class="step"><span class="step-result">           ∴ f'(${f4(x0)}) ≈ ${f4(derivada)}</span></div>`;
  }
  else if(tipo === 'atras'){
    derivada = (fx0 - fx_mh) / h;
    nombreTipo = 'Diferencia Hacia Atrás';
    formula = "f'(x₀) ≈ [f(x₀) − f(x₀−h)] / h";
    steps = `
<div class="step"><span class="step-num">1.</span><span class="step-label">Fórmula:</span></div>
<div class="formula-display">${formula}</div>
<div class="step"><span class="step-num">2.</span><span class="step-label">Datos:</span>
  <span class="step-calc">  x₀ = ${f4(x0)},  h = ${f4(h)}</span></div>
<div class="step"><span class="step-num">3.</span><span class="step-label">Evaluar:</span>
  <span class="step-calc">  f(x₀) = f(${f4(x0)}) = <b>${f4(fx0)}</b></span></div>
<div class="step"><span class="step-calc">           f(x₀−h) = f(${f4(x0-h)}) = <b>${f4(fx_mh)}</b></span></div>
<div class="step"><span class="step-num">4.</span><span class="step-label">Sustituir:</span>
  <span class="step-formula">  f'(${f4(x0)}) ≈ [${f4(fx0)} − ${f4(fx_mh)}] / ${f4(h)}</span></div>
<div class="step"><span class="step-calc">             = ${f4(fx0 - fx_mh)} / ${f4(h)}</span></div>
<div class="step"><span class="step-result">           ∴ f'(${f4(x0)}) ≈ ${f4(derivada)}</span></div>`;
  }
  else {
    derivada = (fx_h - fx_mh) / (2*h);
    nombreTipo = 'Diferencia Centrada';
    formula = "f'(x₀) ≈ [f(x₀+h) − f(x₀−h)] / (2h)";
    steps = `
<div class="step"><span class="step-num">1.</span><span class="step-label">Fórmula:</span></div>
<div class="formula-display">${formula}</div>
<div class="step"><span class="step-num">2.</span><span class="step-label">Datos:</span>
  <span class="step-calc">  x₀ = ${f4(x0)},  h = ${f4(h)}</span></div>
<div class="step"><span class="step-num">3.</span><span class="step-label">Evaluar puntos:</span>
  <span class="step-calc">  f(x₀+h) = f(${f4(x0+h)}) = <b>${f4(fx_h)}</b></span></div>
<div class="step"><span class="step-calc">           f(x₀−h) = f(${f4(x0-h)}) = <b>${f4(fx_mh)}</b></span></div>
<div class="step"><span class="step-num">4.</span><span class="step-label">Sustituir:</span>
  <span class="step-formula">  f'(${f4(x0)}) ≈ [${f4(fx_h)} − ${f4(fx_mh)}] / (2·${f4(h)})</span></div>
<div class="step"><span class="step-calc">             = ${f4(fx_h - fx_mh)} / ${f4(2*h)}</span></div>
<div class="step"><span class="step-result">           ∴ f'(${f4(x0)}) ≈ ${f4(derivada)}</span></div>`;
  }

  document.getElementById('dif-out').innerHTML = `
<div class="steps-container">
  <div class="step-header">// ${nombreTipo} — f(x) = ${fxStr}</div>
  ${steps}
</div>
<div class="result-box">
  <div><div class="result-label">f'(${f4(x0)}) ≈</div><div style="font-size:0.7rem;color:var(--muted);margin-top:2px">${nombreTipo} · h = ${f4(h)}</div></div>
  <div class="result-value">${f4(derivada)}</div>
</div>`;
}

// ─── TRAPECIO ────────────────────────────────────────────
function calcTrap(){
  const fxStr = document.getElementById('trap-fx').value.trim();
  const a = parseFloat(document.getElementById('trap-a').value);
  const b = parseFloat(document.getElementById('trap-b').value);
  const n = parseInt(document.getElementById('trap-n').value);

  if(!fxStr || isNaN(a) || isNaN(b) || isNaN(n) || n<1 || a>=b)
    return errOut('trap-out','Verifica: a < b y n ≥ 1');

  let fn;
  try { fn = parseFn(fxStr); } catch(e){ return errOut('trap-out','Error en función: '+e.message); }

  const h = (b - a) / n;
  let xs = [], ys = [];
  for(let i=0; i<=n; i++){
    xs.push(a + i*h);
    try { ys.push(fn(xs[i])); } catch(e){ return errOut('trap-out','Error evaluando f(x): '+e.message); }
  }

  // Tabla
  let tableRows = '';
  for(let i=0;i<=n;i++){
    const cls = (i===0||i===n) ? 'lo' : 'mid';
    const coef = (i===0||i===n) ? 1 : 2;
    tableRows += `<tr>
      <td>${i}</td>
      <td class="${cls}">${f4(xs[i])}</td>
      <td class="${cls}">${f4(ys[i])}</td>
      <td>${(i===0||i===n)?'×1':'×2'}</td>
      <td class="hi">${f4(coef*ys[i])}</td>
    </tr>`;
  }

  const suma_extremos = ys[0] + ys[n];
  const suma_medios = ys.slice(1,n).reduce((s,v)=>s+v, 0);
  const suma_total = suma_extremos + 2*suma_medios;
  const integral = (h/2) * suma_total;

  document.getElementById('trap-out').innerHTML = `
<div class="steps-container">
  <div class="step-header">// Método del Trapecio Compuesto — f(x) = ${fxStr}</div>
  <div class="step"><span class="step-num">1.</span><span class="step-label">Fórmula compuesta:</span></div>
  <div class="formula-display">∫f(x)dx ≈ (h/2)·[f(x₀) + 2·Σf(xᵢ) + f(xₙ)]</div>
  <div class="step"><span class="step-num">2.</span><span class="step-label">Calcular h:</span>
    <span class="step-calc">  h = (b−a)/n = (${f4(b)}−${f4(a)})/${n} = <b>${f4(h)}</b></span></div>
  <div class="step"><span class="step-num">3.</span><span class="step-label">Tabla de valores xᵢ y f(xᵢ):</span></div>
  <table class="table-vals">
    <thead><tr><th>i</th><th>xᵢ</th><th>f(xᵢ)</th><th>Coef.</th><th>Coef×f(xᵢ)</th></tr></thead>
    <tbody>${tableRows}</tbody>
  </table>
  <div class="step"><span class="step-num">4.</span><span class="step-label">Extremos f(a)+f(b):</span>
    <span class="step-calc">  ${f4(ys[0])} + ${f4(ys[n])} = <b>${f4(suma_extremos)}</b></span></div>
  <div class="step"><span class="step-num">5.</span><span class="step-label">Suma puntos interiores Σf(xᵢ):</span>
    <span class="step-calc">  ${ys.slice(1,n).map(v=>f4(v)).join(' + ')} = <b>${f4(suma_medios)}</b></span></div>
  <div class="step"><span class="step-num">6.</span><span class="step-label">Suma total:</span>
    <span class="step-formula">  ${f4(suma_extremos)} + 2·(${f4(suma_medios)}) = <b>${f4(suma_total)}</b></span></div>
  <div class="step"><span class="step-num">7.</span><span class="step-label">Integral:</span>
    <span class="step-formula">  (h/2)·Suma = (${f4(h)}/2)·${f4(suma_total)}</span></div>
  <div class="step"><span class="step-result">  ∴ ∫f(x)dx ≈ ${f4(integral)}</span></div>
</div>
<div class="result-box">
  <div><div class="result-label">∫ f(x) dx ≈</div><div style="font-size:0.7rem;color:var(--muted);margin-top:2px">Trapecio · n=${n} · h=${f4(h)}</div></div>
  <div class="result-value">${f4(integral)}</div>
</div>`;
}

// ─── SIMPSON 1/3 ──────────────────────────────────────────
function calcSimp13(){
  const fxStr = document.getElementById('s13-fx').value.trim();
  const a = parseFloat(document.getElementById('s13-a').value);
  const b = parseFloat(document.getElementById('s13-b').value);
  let n = parseInt(document.getElementById('s13-n').value);

  if(!fxStr||isNaN(a)||isNaN(b)||isNaN(n)||a>=b)
    return errOut('s13-out','Verifica los datos ingresados.');
  if(n<2){ n=4; document.getElementById('s13-n').value=4; }
  if(n%2!==0){ n++; document.getElementById('s13-n').value=n; }

  let fn;
  try { fn = parseFn(fxStr); } catch(e){ return errOut('s13-out','Error en función: '+e.message); }

  const h = (b-a)/n;
  let xs=[],ys=[];
  for(let i=0;i<=n;i++){
    xs.push(a+i*h);
    try{ ys.push(fn(xs[i])); } catch(e){ return errOut('s13-out','Error evaluando f(x)'); }
  }

  let tableRows='';
  for(let i=0;i<=n;i++){
    let coef, cls;
    if(i===0||i===n){ coef=1; cls='lo'; }
    else if(i%2!==0){ coef=4; cls='hi'; }
    else { coef=2; cls='mid'; }
    tableRows+=`<tr><td>${i}</td><td class="${cls}">${f4(xs[i])}</td><td class="${cls}">${f4(ys[i])}</td>
      <td>${coef===1?'×1':coef===4?'×4':'×2'}</td><td class="hi">${f4(coef*ys[i])}</td></tr>`;
  }

  const sum1 = ys[0]+ys[n];
  const sum4 = ys.filter((_,i)=>i>0&&i<n&&i%2!==0).reduce((s,v)=>s+v,0);
  const sum2 = ys.filter((_,i)=>i>0&&i<n&&i%2===0).reduce((s,v)=>s+v,0);
  const sumaTotal = sum1 + 4*sum4 + 2*sum2;
  const integral = (h/3)*sumaTotal;

  document.getElementById('s13-out').innerHTML=`
<div class="steps-container">
  <div class="step-header">// Simpson 1/3 Compuesto — f(x) = ${fxStr}</div>
  <div class="step"><span class="step-num">1.</span><span class="step-label">Fórmula:</span></div>
  <div class="formula-display">∫f(x)dx ≈ (h/3)·[f(x₀) + 4·Σf(x_impar) + 2·Σf(x_par) + f(xₙ)]</div>
  <div class="step"><span class="step-num">2.</span><span class="step-label">Calcular h:</span>
    <span class="step-calc">  h = (${f4(b)}−${f4(a)})/${n} = <b>${f4(h)}</b></span></div>
  <div class="step"><span class="step-num">3.</span><span class="step-label">Tabla de valores (azul=×1, verde=×4, rosa=×2):</span></div>
  <table class="table-vals">
    <thead><tr><th>i</th><th>xᵢ</th><th>f(xᵢ)</th><th>Coef.</th><th>Coef×f(xᵢ)</th></tr></thead>
    <tbody>${tableRows}</tbody>
  </table>
  <div class="step"><span class="step-num">4.</span><span class="step-label">Extremos (×1):</span>
    <span class="step-calc">  ${f4(ys[0])} + ${f4(ys[n])} = <b>${f4(sum1)}</b></span></div>
  <div class="step"><span class="step-num">5.</span><span class="step-label">Índices impares (×4):</span>
    <span class="step-calc">  4 × (${ys.filter((_,i)=>i>0&&i<n&&i%2!==0).map(v=>f4(v)).join('+')}) = <b>${f4(4*sum4)}</b></span></div>
  <div class="step"><span class="step-num">6.</span><span class="step-label">Índices pares interiores (×2):</span>
    <span class="step-calc">  2 × (${ys.filter((_,i)=>i>0&&i<n&&i%2===0).map(v=>f4(v)).join('+') || '0'}) = <b>${f4(2*sum2)}</b></span></div>
  <div class="step"><span class="step-num">7.</span><span class="step-label">Suma total:</span>
    <span class="step-formula">  ${f4(sum1)} + ${f4(4*sum4)} + ${f4(2*sum2)} = <b>${f4(sumaTotal)}</b></span></div>
  <div class="step"><span class="step-num">8.</span><span class="step-label">Integral:</span>
    <span class="step-formula">  (h/3)·Suma = (${f4(h)}/3)·${f4(sumaTotal)}</span></div>
  <div class="step"><span class="step-result">  ∴ ∫f(x)dx ≈ ${f4(integral)}</span></div>
</div>
<div class="result-box">
  <div><div class="result-label">∫ f(x) dx ≈</div><div style="font-size:0.7rem;color:var(--muted);margin-top:2px">Simpson 1/3 · n=${n} · h=${f4(h)}</div></div>
  <div class="result-value">${f4(integral)}</div>
</div>`;
}

// ─── SIMPSON 3/8 ──────────────────────────────────────────
function calcSimp38(){
  const fxStr = document.getElementById('s38-fx').value.trim();
  const a = parseFloat(document.getElementById('s38-a').value);
  const b = parseFloat(document.getElementById('s38-b').value);

  if(n<3) n=3;
  if(n%3!==0) n = Math.round(n/3)*3||3;
  document.getElementById('s38-n').value = n;

  let fn;
  try { fn = parseFn(fxStr); } catch(e){ return errOut('s38-out','Error en función: '+e.message); }

  const h = (b-a)/n;
  let xs=[],ys=[];
  for(let i=0;i<=n;i++){
    xs.push(a+i*h);

  }

  let tableRows='';
  for(let i=0;i<=n;i++){
    let coef, cls;
    if(i===0||i===n){ coef=1; cls='lo'; }
    else if(i%3===0){ coef=2; cls='mid'; }
    else { coef=3; cls='hi'; }
    tableRows+=`<tr><td>${i}</td><td class="${cls}">${f4(xs[i])}</td><td class="${cls}">${f4(ys[i])}</td>
      <td>${coef===1?'×1':coef===3?'×3':'×2'}</td><td class="hi">${f4(coef*ys[i])}</td></tr>`;
  }

  const sum1 = ys[0]+ys[n];
  const sum2 = ys.filter((_,i)=>i>0&&i<n&&i%3===0).reduce((s,v)=>s+v,0);
  const sum3 = ys.filter((_,i)=>i>0&&i<n&&i%3!==0).reduce((s,v)=>s+v,0);
  const sumaTotal = sum1 + 2*sum2 + 3*sum3;
  const integral = (3*h/8)*sumaTotal;

  document.getElementById('s38-out').innerHTML=`
<div class="steps-container">
  <div class="step-header">// Simpson 3/8 Compuesto — f(x) = ${fxStr}</div>
  <div class="step"><span class="step-num">1.</span><span class="step-label">Fórmula:</span></div>
  <div class="formula-display">∫f(x)dx ≈ (3h/8)·[f(x₀) + 3·Σf(x_no_mult3) + 2·Σf(x_mult3_int) + f(xₙ)]</div>
  <div class="step"><span class="step-num">2.</span><span class="step-label">Calcular h:</span>
    <span class="step-calc">  h = (${f4(b)}−${f4(a)})/${n} = <b>${f4(h)}</b></span></div>
  <div class="step"><span class="step-num">3.</span><span class="step-label">Tabla de valores (azul=×1, verde=×3, rosa=×2):</span></div>
  <table class="table-vals">
    <thead><tr><th>i</th><th>xᵢ</th><th>f(xᵢ)</th><th>Coef.</th><th>Coef×f(xᵢ)</th></tr></thead>
    <tbody>${tableRows}</tbody>
  </table>
  <div class="step"><span class="step-num">4.</span><span class="step-label">Extremos (×1):</span>
    <span class="step-calc">  ${f4(ys[0])} + ${f4(ys[n])} = <b>${f4(sum1)}</b></span></div>
  <div class="step"><span class="step-num">5.</span><span class="step-label">Múltiplos de 3 interiores (×2):</span>
    <span class="step-calc">  2 × (${ys.filter((_,i)=>i>0&&i<n&&i%3===0).map(v=>f4(v)).join('+') || '0'}) = <b>${f4(2*sum2)}</b></span></div>
  <div class="step"><span class="step-num">6.</span><span class="step-label">No múltiplos de 3 (×3):</span>
    <span class="step-calc">  3 × (${ys.filter((_,i)=>i>0&&i<n&&i%3!==0).map(v=>f4(v)).join('+')}) = <b>${f4(3*sum3)}</b></span></div>
  <div class="step"><span class="step-num">7.</span><span class="step-label">Suma total:</span>
    <span class="step-formula">  ${f4(sum1)} + ${f4(2*sum2)} + ${f4(3*sum3)} = <b>${f4(sumaTotal)}</b></span></div>
  <div class="step"><span class="step-num">8.</span><span class="step-label">Integral:</span>
    <span class="step-formula">  (3h/8)·Suma = (3·${f4(h)}/8)·${f4(sumaTotal)}</span></div>
  <div class="step"><span class="step-result">  ∴ ∫f(x)dx ≈ ${f4(integral)}</span></div>
</div>
<div class="result-box">
  <div><div class="result-label">∫ f(x) dx ≈</div><div style="font-size:0.7rem;color:var(--muted);margin-top:2px">Simpson 3/8 · n=${n} · h=${f4(h)}</div></div>

</div>`;
}
